name: Required Backend Checks

on:
  push:
    paths:
      - ".github/workflows/backend-deterministic-checks.yml"
      - "backend/**"
      - "pyproject.toml"
      - "docs/operations/MONTHLY_USER_JOURNEY_SIMULATION.md"
  pull_request:
    paths:
      - ".github/workflows/backend-deterministic-checks.yml"
      - "backend/**"
      - "pyproject.toml"
      - "docs/operations/MONTHLY_USER_JOURNEY_SIMULATION.md"

jobs:
  backend-deterministic-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: marketmind_ci
          POSTGRES_PASSWORD: marketmind_ci
          POSTGRES_USER: marketmind_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U marketmind_ci -d marketmind_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt
          python -m pip install pip-audit==2.10.1

      - name: Audit backend dependencies
        run: python -m pip_audit -r backend/requirements.txt --strict

      - name: Apply production database migrations
        run: python -m alembic upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://marketmind_ci:marketmind_ci@localhost:5432/marketmind_ci

      - name: Run deterministic backend checks
        run: |
          bash backend/run_deterministic_backend_checks.sh

      - name: Build production image
        run: docker build --tag marketmind-backend:ci --file backend/Dockerfile backend

      - name: Smoke-test production image imports
        run: docker run --rm --entrypoint python marketmind-backend:ci -c "from api import app; assert app is not None"
