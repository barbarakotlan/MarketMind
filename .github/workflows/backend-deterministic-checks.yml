name: Backend Deterministic Checks

on:
  push:
    paths:
      - ".github/workflows/backend-deterministic-checks.yml"
      - "backend/**"
      - "MONTHLY_USER_JOURNEY_SIMULATION.md"
  pull_request:
    paths:
      - ".github/workflows/backend-deterministic-checks.yml"
      - "backend/**"
      - "MONTHLY_USER_JOURNEY_SIMULATION.md"

jobs:
  backend-deterministic-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Build CI requirements
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path("backend/requirements.txt").read_text(encoding="utf-8").splitlines()
          filtered = []
          for line in source:
              stripped = line.strip()
              if not stripped or stripped.startswith("#"):
                  continue
              if stripped.startswith("dr-manhattan"):
                  continue
              if stripped.startswith("openbb["):
                  continue
              filtered.append(stripped)
          Path("backend/requirements-ci.txt").write_text("\n".join(filtered) + "\n", encoding="utf-8")
          PY

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-ci.txt

      - name: Run deterministic backend checks
        run: |
          bash backend/run_deterministic_backend_checks.sh
