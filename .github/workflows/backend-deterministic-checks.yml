name: Required Backend Checks

on:
  push:
    paths:
      - ".github/workflows/backend-deterministic-checks.yml"
      - "backend/**"
      - "pyproject.toml"
      - "docs/operations/MONTHLY_USER_JOURNEY_SIMULATION.md"
  pull_request:
    paths:
      - ".github/workflows/backend-deterministic-checks.yml"
      - "backend/**"
      - "pyproject.toml"
      - "docs/operations/MONTHLY_USER_JOURNEY_SIMULATION.md"

jobs:
  backend-deterministic-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt
          python -m pip install pip-audit==2.10.1

      - name: Audit backend dependencies
        run: python -m pip_audit -r backend/requirements.txt --strict

      - name: Run deterministic backend checks
        run: |
          bash backend/run_deterministic_backend_checks.sh

      - name: Build production image
        run: docker build --file backend/Dockerfile backend
