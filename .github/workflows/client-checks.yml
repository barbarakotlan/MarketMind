name: Required Client Checks

on:
  push:
    paths:
      - ".github/workflows/client-checks.yml"
      - "packages/client/**"
      - "backend/public_api_openapi_v2.yaml"
  pull_request:
    paths:
      - ".github/workflows/client-checks.yml"
      - "packages/client/**"
      - "backend/public_api_openapi_v2.yaml"

jobs:
  client-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/client

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Check generated types are in sync with the OpenAPI spec
        run: |
          npm run generate:types
          git diff --exit-code src/generated/openapi.ts

      - name: Build and test
        run: npm run check
