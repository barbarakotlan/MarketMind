openapi: 3.1.0
info:
  title: MarketMind Public API
  version: v2
  summary: Private beta, expanded read-only API surface for market research workflows.
  description: |
    MarketMind Public API v2 keeps the same private-beta, API-key-authenticated model as v1,
    and adds read-only research surfaces including options, FX, crypto, commodities,
    prediction markets metadata, and the economic calendar.
servers:
  - url: https://api.marketmind.example.com
  - url: http://127.0.0.1:5001
security:
  - MarketMindDeveloperKey: []
tags:
  - name: Health
  - name: Options
  - name: Forex
  - name: Crypto
  - name: Commodities
  - name: Prediction Markets
  - name: Calendar
paths:
  /api/public/v2/health:
    get:
      tags: [Health]
      summary: Check API availability
      responses:
        '200':
          description: API is available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '401': { $ref: '#/components/responses/PublicAuthError' }
        '429': { $ref: '#/components/responses/PublicRateLimitError' }
  /api/public/v2/options/stock-price/{ticker}:
    get:
      tags: [Options]
      summary: Get current stock price used for options views
      parameters:
        - $ref: '#/components/parameters/Ticker'
      responses:
        '200':
          description: Stock price for options context
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticker: { type: string, example: AAPL }
                  price: { type: number, example: 213.45 }
        '401': { $ref: '#/components/responses/PublicAuthError' }
        '429': { $ref: '#/components/responses/PublicRateLimitError' }
        '503': { $ref: '#/components/responses/PublicUpstreamError' }
  /api/public/v2/options/expirations/{ticker}:
    get:
      tags: [Options]
      summary: Get option expiration dates
      parameters:
        - $ref: '#/components/parameters/Ticker'
      responses:
        '200':
          description: Expiration list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticker: { type: string }
                  expirations:
                    type: array
                    items: { type: string }
        '401': { $ref: '#/components/responses/PublicAuthError' }
        '404': { $ref: '#/components/responses/PublicNotFoundError' }
        '429': { $ref: '#/components/responses/PublicRateLimitError' }
  /api/public/v2/options/chain/{ticker}:
    get:
      tags: [Options]
      summary: Get option chain for a ticker
      parameters:
        - $ref: '#/components/parameters/Ticker'
        - in: query
          name: date
          required: false
          schema:
            type: string
          description: Optional expiration date.
      responses:
        '200':
          description: Option chain response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticker: { type: string }
                  expiration: { type: string, nullable: true }
                  stock_price: { type: number }
                  calls:
                    type: array
                    items: { type: object, additionalProperties: true }
                  puts:
                    type: array
                    items: { type: object, additionalProperties: true }
        '401': { $ref: '#/components/responses/PublicAuthError' }
        '429': { $ref: '#/components/responses/PublicRateLimitError' }
        '503': { $ref: '#/components/responses/PublicUpstreamError' }
  /api/public/v2/options/suggest/{ticker}:
    get:
      tags: [Options]
      summary: Get option strategy suggestion
      parameters:
        - $ref: '#/components/parameters/Ticker'
      responses:
        '200':
          description: Options suggestion payload
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401': { $ref: '#/components/responses/PublicAuthError' }
        '404': { $ref: '#/components/responses/PublicNotFoundError' }
        '429': { $ref: '#/components/responses/PublicRateLimitError' }
  /api/public/v2/forex/convert:
    get:
      tags: [Forex]
      summary: Convert between fiat currencies
      parameters:
        - in: query
          name: from
          required: false
          schema: { type: string, default: USD }
        - in: query
          name: to
          required: false
          schema: { type: string, default: EUR }
      responses:
        '200':
          description: Conversion payload
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401': { $ref: '#/components/responses/PublicAuthError' }
        '404': { $ref: '#/components/responses/PublicNotFoundError' }
        '429': { $ref: '#/components/responses/PublicRateLimitError' }
  /api/public/v2/forex/currencies:
    get:
      tags: [Forex]
      summary: List supported forex currencies
      responses:
        '200':
          description: Currency list
          content:
            application/json:
              schema:
                type: object
                properties:
                  currencies:
                    type: array
                    items: { type: object, additionalProperties: true }
        '401': { $ref: '#/components/responses/PublicAuthError' }
        '429': { $ref: '#/components/responses/PublicRateLimitError' }
  /api/public/v2/crypto/convert:
    get:
      tags: [Crypto]
      summary: Convert a crypto asset into a target currency
      parameters:
        - in: query
          name: from
          required: false
          schema: { type: string, default: BTC }
        - in: query
          name: to
          required: false
          schema: { type: string, default: USD }
      responses:
        '200': { description: Conversion payload }
        '401': { $ref: '#/components/responses/PublicAuthError' }
        '404': { $ref: '#/components/responses/PublicNotFoundError' }
        '429': { $ref: '#/components/responses/PublicRateLimitError' }
  /api/public/v2/crypto/list:
    get:
      tags: [Crypto]
      summary: List supported crypto assets
      responses:
        '200': { description: Asset list }
        '401': { $ref: '#/components/responses/PublicAuthError' }
        '429': { $ref: '#/components/responses/PublicRateLimitError' }
  /api/public/v2/crypto/currencies:
    get:
      tags: [Crypto]
      summary: List supported target currencies for crypto conversion
      responses:
        '200': { description: Currency list }
        '401': { $ref: '#/components/responses/PublicAuthError' }
        '429': { $ref: '#/components/responses/PublicRateLimitError' }
  /api/public/v2/commodities/price/{commodity}:
    get:
      tags: [Commodities]
      summary: Get commodity price series
      parameters:
        - in: path
          name: commodity
          required: true
          schema: { type: string }
        - in: query
          name: period
          required: false
          schema: { type: string, default: 5d }
      responses:
        '200': { description: Commodity price payload }
        '401': { $ref: '#/components/responses/PublicAuthError' }
        '404': { $ref: '#/components/responses/PublicNotFoundError' }
        '429': { $ref: '#/components/responses/PublicRateLimitError' }
  /api/public/v2/commodities/list:
    get:
      tags: [Commodities]
      summary: List commodity symbols
      responses:
        '200': { description: Commodity list }
        '401': { $ref: '#/components/responses/PublicAuthError' }
        '429': { $ref: '#/components/responses/PublicRateLimitError' }
  /api/public/v2/commodities/all:
    get:
      tags: [Commodities]
      summary: Get commodity catalog by category
      responses:
        '200': { description: Commodity catalog }
        '401': { $ref: '#/components/responses/PublicAuthError' }
        '429': { $ref: '#/components/responses/PublicRateLimitError' }
  /api/public/v2/prediction-markets:
    get:
      tags: [Prediction Markets]
      summary: List prediction markets
      parameters:
        - in: query
          name: exchange
          required: false
          schema: { type: string, default: polymarket }
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
        - in: query
          name: search
          required: false
          schema: { type: string }
      responses:
        '200': { description: Prediction markets list }
        '400': { $ref: '#/components/responses/PublicInvalidQueryError' }
        '401': { $ref: '#/components/responses/PublicAuthError' }
        '429': { $ref: '#/components/responses/PublicRateLimitError' }
  /api/public/v2/prediction-markets/exchanges:
    get:
      tags: [Prediction Markets]
      summary: List supported prediction market exchanges
      responses:
        '200': { description: Exchange list }
        '401': { $ref: '#/components/responses/PublicAuthError' }
        '429': { $ref: '#/components/responses/PublicRateLimitError' }
  /api/public/v2/prediction-markets/{market_id}:
    get:
      tags: [Prediction Markets]
      summary: Get a prediction market by id
      parameters:
        - in: path
          name: market_id
          required: true
          schema: { type: string }
        - in: query
          name: exchange
          required: false
          schema: { type: string, default: polymarket }
      responses:
        '200': { description: Market detail }
        '401': { $ref: '#/components/responses/PublicAuthError' }
        '404': { $ref: '#/components/responses/PublicNotFoundError' }
        '429': { $ref: '#/components/responses/PublicRateLimitError' }
  /api/public/v2/calendar/economic:
    get:
      tags: [Calendar]
      summary: Get the current U.S. economic calendar view
      responses:
        '200': { description: Economic calendar events }
        '401': { $ref: '#/components/responses/PublicAuthError' }
        '429': { $ref: '#/components/responses/PublicRateLimitError' }
        '503': { $ref: '#/components/responses/PublicUpstreamError' }
components:
  securitySchemes:
    MarketMindDeveloperKey:
      type: http
      scheme: bearer
      bearerFormat: MarketMind developer API key
      description: Use `Authorization: Bearer <marketmind_developer_api_key>`.
  parameters:
    Ticker:
      in: path
      name: ticker
      required: true
      schema: { type: string }
  responses:
    PublicAuthError:
      description: Missing, invalid, revoked, or expired API key
      content:
        application/json:
          schema: { $ref: '#/components/schemas/PublicErrorEnvelope' }
    PublicRateLimitError:
      description: Request exceeded a rate limit or quota
      content:
        application/json:
          schema: { $ref: '#/components/schemas/PublicErrorEnvelope' }
    PublicInvalidQueryError:
      description: Invalid query parameter value
      content:
        application/json:
          schema: { $ref: '#/components/schemas/PublicErrorEnvelope' }
    PublicNotFoundError:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/PublicErrorEnvelope' }
    PublicUpstreamError:
      description: Upstream provider unavailable or failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/PublicErrorEnvelope' }
  schemas:
    HealthResponse:
      type: object
      properties:
        status: { type: string, example: ok }
        api: { type: string, example: marketmind-public }
        version: { type: string, example: v2 }
        beta: { type: boolean, example: true }
      required: [status, api, version, beta]
    PublicErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string, example: not_found }
            message: { type: string, example: Resource not found. }
            request_id: { type: string, example: 4e0c7cddb9e84b60ac93dc11145a7738 }
          required: [code, message, request_id]
      required: [error]
